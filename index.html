<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACIE SAMY | PREMIUM STORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

        :root {
            --primary: #064e3b; /* أخضر غامق فخم */
            --accent: #10b981;  /* أخضر زمردي */
            --gold: #fbbf24;    /* لمسة ذهبية */
            --glass: rgba(255, 255, 255, 0.92);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?q=80&w=2080&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #1f2937;
        }

        /* الهيدر الفخم */
        header {
            background: var(--glass);
            margin: 20px;
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .brand-zone { display: flex; align-items: center; gap: 15px; }
        .logo-box { background: var(--primary); color: white; padding: 12px; border-radius: 15px; font-size: 24px; }
        .brand-name h1 { font-weight: 900; color: var(--primary); font-size: 22px; line-height: 1; }
        .brand-name span { font-size: 10px; color: var(--accent); font-bold; letter-spacing: 2px; }

        /* لوحة التحكم - ديزاين جديد */
        #adminArea {
            display: none;
            background: var(--glass);
            margin: 20px;
            padding: 30px;
            border-radius: 25px;
            border: 3px solid var(--accent);
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        input, select { padding: 15px; border-radius: 12px; border: 2px solid #e5e7eb; font-family: 'Tajawal'; font-weight: bold; }
        input:focus { border-color: var(--accent); outline: none; }
        
        .btn-upload {
            background: var(--primary); color: white; padding: 18px; border: none; 
            border-radius: 15px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer;
            transition: 0.3s;
        }
        .btn-upload:hover { background: var(--accent); transform: scale(1.01); }

        /* شبكة المنتجات */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
            padding: 20px;
        }

        .product-card {
            background: var(--glass);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            transition: 0.3s;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; }
        .badge { position: absolute; top: 10px; right: 10px; background: var(--gold); color: #000; padding: 3px 10px; border-radius: 10px; font-size: 10px; font-weight: bold; }
        .p-title { font-weight: bold; color: var(--primary); font-size: 16px; }
        .p-brand { font-size: 12px; color: #6b7280; margin: 5px 0; }
        .p-price { font-size: 20px; font-weight: 900; color: var(--accent); }

        /* أزرار التواصل العائمة */
        .social-bar {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: white; padding: 12px 30px; border-radius: 50px;
            display: flex; gap: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); z-index: 9999;
        }
        .social-bar a { font-size: 28px; transition: 0.3s; }
        .social-bar a:hover { transform: scale(1.2); }
        .wa { color: #25D366; } .ig { color: #E1306C; } .tk { color: #000; } .map { color: #4285F4; }

    </style>
</head>
<body>

    <header>
        <div class="brand-zone">
            <div class="logo-box"><i class="fas fa-prescription-bottle-medical"></i></div>
            <div class="brand-name">
                <h1>PHARMACIE SAMY</h1>
                <span>PREMIUM STORE</span>
            </div>
        </div>
        <button onclick="openAdmin()" style="background:none; border:none; cursor:pointer; color:var(--primary); font-size: 24px;">
            <i class="fas fa-lock"></i>
        </button>
    </header>

    <main>
        <div id="adminArea">
            <h2 style="margin-bottom: 20px; color: var(--primary);">لوحة إضافة المنتجات</h2>
            <div class="form-grid">
                <input type="text" id="pName" placeholder="اسم المنتج">
                <input type="text" id="pBrand" placeholder="الماركة">
                <input type="number" id="pPrice" placeholder="السعر">
                <select id="pCat">
                    <option value="درمو-كوسميتيك">درمو-كوسميتيك</option>
                    <option value="الأم والطفل">الأم والطفل</option>
                    <option value="مكملات غذائية">مكملات غذائية</option>
                    <option value="عناية بالأسنان">عناية بالأسنان</option>
                    <option value="أدوية">أدوية</option>
                </select>
            </div>
            <input type="file" id="pImg" style="margin-bottom: 20px; width: 100%;">
            <button class="btn-upload" id="uploadBtn" onclick="processUpload()">نشر المنتج فوراً</button>
        </div>

        <div class="products-grid" id="mainGrid">
            </div>
    </main>

    <div class="social-bar">
        <a href="https://wa.me/213770762987" class="wa"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/pharmaciesamy/" class="ig"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@pharmacie.samy" class="tk"><i class="fab fa-tiktok"></i></a>
        <a href="https://share.google/1uSFRbdMSAfgNZSUU" class="map"><i class="fas fa-map-marker-alt"></i></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXOljj0H5909ivD-OhMbIVsF_pjzSDtBg",
            authDomain: "pharmacie-samy.firebaseapp.com",
            projectId: "pharmacie-samy",
            storageBucket: "pharmacie-samy.firebasestorage.app",
            messagingSenderId: "178950700829",
            appId: "1:178950700829:web:1d5f72f25352c3fe642bf4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        window.openAdmin = () => {
            if(prompt("PASSWORD:") === "pharmaciesami001") {
                document.getElementById('adminArea').style.display = "block";
            }
        };

        window.processUpload = async () => {
            const name = document.getElementById('pName').value;
            const brand = document.getElementById('pBrand').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCat').value;
            const file = document.getElementById('pImg').files[0];
            const btn = document.getElementById('uploadBtn');

            if(!name || !file) return alert("البيانات ناقصة!");

            btn.disabled = true; btn.innerText = "جاري الرفع...";

            try {
                const sRef = ref(storage, `products/${Date.now()}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "meds"), { name, brand, price, cat, img: url, time: Date.now() });
                alert("تم الحفظ!"); location.reload();
            } catch (e) { alert("خطأ في الاتصال!"); btn.disabled = false; }
        };

        const q = query(collection(db, "meds"), orderBy("time", "desc"));
        onSnapshot(q, (snap) => {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                    <div class="product-card">
                        <div class="badge">${p.cat}</div>
                        <img src="${p.img}">
                        <div class="p-title">${p.name}</div>
                        <div class="p-brand">${p.brand}</div>
                        <div class="p-price">${p.price} DA</div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
