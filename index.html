<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHARMACIE SAMY | Premium Showcase</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', 'Noto Sans Arabic', sans-serif; background-color: #fcfdfe; scroll-behavior: smooth; }
        .pharma-blue { color: #0d47a1; }
        .bg-pharma { background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%); }
        .hero-gradient { background: linear-gradient(to right, rgba(13, 71, 161, 0.85), rgba(13, 71, 161, 0.4)), url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=1920&auto=format&fit=crop'); background-size: cover; background-position: center; }
        
        .product-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; position: relative; }
        .product-card:hover { transform: translateY(-8px); border-color: #0d47a1; box-shadow: 0 15px 30px rgba(13,71,161,0.1); }
        
        .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 1000; transition: 0.3s; }
        
        /* الأقسام وتفعيلها */
        .cat-card { cursor: pointer; transition: 0.3s; border: 2px solid transparent; background: white; }
        .cat-card:hover { transform: translateY(-5px); border-color: #0d47a1; }
        .cat-card.active { border-color: #0d47a1 !important; background-color: #eff6ff !important; }

        /* شريط الماركات */
        .brand-pill { cursor: pointer; padding: 8px 16px; border-radius: 99px; font-size: 11px; font-weight: bold; border: 1px solid #e2e8f0; transition: 0.3s; background: white; white-space: nowrap; }
        .brand-pill.active { background: #0d47a1 !important; color: white !important; border-color: #0d47a1 !important; }
        
        /* زر الحذف للأدمن */
        .admin-delete-btn { display: none; position: absolute; top: 10px; right: 10px; background: #ef4444; color: white; width: 32px; height: 32px; border-radius: 50%; z-index: 50; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); border: none; }
        .is-admin .admin-delete-btn { display: flex; }
    </style>
</head>
<body>

    <nav class="bg-white/80 backdrop-blur-md shadow-sm border-b sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <i class="fa-solid fa-mortar-pestle pharma-blue text-2xl"></i>
                <h1 class="text-xl font-bold pharma-blue tracking-tighter uppercase">PHARMACIE SAMY</h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="switchLang('fr')" class="text-xs font-bold px-2 py-1 rounded border hover:bg-gray-100">FR</button>
                <button onclick="switchLang('ar')" class="text-xs font-bold px-2 py-1 rounded border hover:bg-gray-100">AR</button>
                <button onclick="showAdmin()" class="text-gray-400 hover:text-blue-600 text-xl ml-2"><i class="fa-solid fa-user-lock"></i></button>
            </div>
        </div>
    </nav>

    <header class="hero-gradient text-white py-24 px-6 relative">
        <div class="max-w-7xl mx-auto">
            <div class="max-w-xl">
                <span class="bg-blue-500/30 text-blue-100 px-3 py-1 rounded-full text-xs font-bold tracking-widest uppercase mb-4 inline-block">Premium Care</span>
                <h2 id="hero-title" class="text-5xl md:text-6xl font-extrabold mb-6 leading-tight">Votre Beauté, Notre Expertise.</h2>
                <p id="hero-sub" class="text-blue-50 text-lg mb-8 opacity-90">Découvrez notre sélection exclusive de produits Dermocosmétiques.</p>
                <div class="flex gap-4">
                    <a href="#products" class="bg-white text-blue-900 px-8 py-4 rounded-xl font-bold shadow-lg">Explorer</a>
                    <a href="https://wa.me/213770762987" class="bg-green-500 text-white px-8 py-4 rounded-xl font-bold flex items-center gap-2"><i class="fa-brands fa-whatsapp"></i> WhatsApp</a>
                </div>
            </div>
        </div>
    </header>

    <section class="py-12 bg-white border-b sticky top-[72px] z-50 overflow-x-auto">
        <div class="max-w-7xl mx-auto px-6 flex md:grid md:grid-cols-4 gap-4">
            <div onclick="filterByCategory('Dermocosmétique')" id="cat-Dermocosmétique" class="cat-card flex-shrink-0 w-40 md:w-auto text-center p-6 border rounded-2xl">
                <i class="fa-solid fa-pump-medical pharma-blue text-3xl mb-3 pointer-events-none"></i>
                <h3 class="font-bold text-sm pointer-events-none">Dermocosmétique</h3>
            </div>
            <div onclick="filterByCategory('Maman & Bébé')" id="cat-Maman" class="cat-card flex-shrink-0 w-40 md:w-auto text-center p-6 border rounded-2xl">
                <i class="fa-solid fa-baby-carriage pharma-blue text-3xl mb-3 pointer-events-none"></i>
                <h3 class="font-bold text-sm pointer-events-none">Maman & Bébé</h3>
            </div>
            <div onclick="filterByCategory('Hygiène')" id="cat-Hygiène" class="cat-card flex-shrink-0 w-40 md:w-auto text-center p-6 border rounded-2xl">
                <i class="fa-solid fa-tooth pharma-blue text-3xl mb-3 pointer-events-none"></i>
                <h3 class="font-bold text-sm pointer-events-none">Hygiène</h3>
            </div>
            <div onclick="filterByCategory('Compléments')" id="cat-Compléments" class="cat-card flex-shrink-0 w-40 md:w-auto text-center p-6 border rounded-2xl">
                <i class="fa-solid fa-capsules pharma-blue text-3xl mb-3 pointer-events-none"></i>
                <h3 class="font-bold text-sm pointer-events-none">Compléments</h3>
            </div>
        </div>
    </section>

    <section id="brands-bar" class="hidden py-6 bg-gray-50 border-b overflow-x-auto">
        <div class="max-w-7xl mx-auto px-6">
            <p class="text-[10px] font-bold text-gray-400 mb-3 uppercase tracking-widest">Filtrer par marque:</p>
            <div id="brands-list" class="flex gap-2"></div>
        </div>
    </section>

    <main id="products" class="max-w-7xl mx-auto px-6 py-16">
        <div class="mb-12">
            <h2 id="section-title" class="text-3xl font-bold text-gray-900 mb-6">Tous les produits</h2>
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Rechercher (Vichy, CeraVe...)" 
                   class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-blue-600 outline-none shadow-sm">
        </div>
        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8"></div>
    </main>

    <a href="https://wa.me/213770762987" class="whatsapp-float" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>

    <div id="adminModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-lg w-full p-8 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeAdmin()" class="absolute top-4 right-6 text-gray-400 text-2xl">×</button>
            <div id="loginArea">
                <h3 class="text-2xl font-bold mb-6 text-center">Admin Access</h3>
                <input type="email" id="adminEmail" placeholder="Email" class="w-full p-4 bg-gray-50 border rounded-xl mb-4 outline-none">
                <input type="password" id="adminPass" placeholder="Password" class="w-full p-4 bg-gray-50 border rounded-xl mb-6 outline-none">
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-pharma text-white py-4 rounded-xl font-bold">Entrer</button>
            </div>
            <div id="adminPanel" class="hidden space-y-4">
                <h3 class="text-xl font-bold border-b pb-2">Gestion des Produits</h3>
                <input type="text" id="pNameFr" placeholder="Nom FR" class="w-full p-3 border rounded-lg">
                <input type="text" id="pNameAr" placeholder="الاسم بالعربية" class="w-full p-3 border rounded-lg text-right">
                <input type="number" id="pPrice" placeholder="Prix (DA)" class="w-full p-3 border rounded-lg">
                <input type="text" id="pBrand" placeholder="Marque (Vichy...)" class="w-full p-3 border rounded-lg">
                <select id="pCat" class="w-full p-3 border rounded-lg bg-white">
                    <option value="Dermocosmétique">Dermocosmétique</option>
                    <option value="Maman & Bébé">Maman & Bébé</option>
                    <option value="Hygiène">Hygiène</option>
                    <option value="Compléments">Compléments</option>
                </select>
                <input type="text" id="pImg" placeholder="Lien image URL" class="w-full p-3 border rounded-lg">
                <button onclick="addProduct()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">Publier</button>
                <button onclick="logout()" class="w-full text-red-500 text-sm mt-4 underline">Déconnexion</button>
            </div>
        </div>
    </div>

    <script>
        // --- ضع بياناتك هنا ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL';
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allProducts = [];
        let currentLocale = 'fr';
        let currentCategory = null;
        let isAdmin = localStorage.getItem('samy_is_admin') === 'true';

        // جلب البيانات
        async function fetchProducts() {
            const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
            if (!error) {
                allProducts = data;
                renderGrid(allProducts);
                if(isAdmin) document.body.classList.add('is-admin');
            }
        }

        // عرض الشبكة
        function renderGrid(products) {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            products.forEach(p => {
                const name = currentLocale === 'ar' ? (p.name_ar || p.name_fr) : p.name_fr;
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 product-card flex flex-col shadow-sm">
                        <button onclick="deleteProduct('${p.id}')" class="admin-delete-btn"><i class="fa-solid fa-trash-can"></i></button>
                        <div class="aspect-square mb-4 bg-gray-50 rounded-xl flex items-center justify-center overflow-hidden">
                            <img src="${p.img_url || 'https://via.placeholder.com/200'}" class="max-h-full object-contain p-2">
                        </div>
                        <span class="text-[10px] text-blue-600 font-bold uppercase">${p.brand}</span>
                        <h4 class="font-bold text-gray-800 text-sm mt-1 h-10 overflow-hidden line-clamp-2">${name}</h4>
                        <div class="mt-4 pt-4 border-t flex justify-between items-center">
                            <span class="text-xl font-bold pharma-blue">${p.price} DA</span>
                            <a href="https://wa.me/213770762987?text=Commander: ${p.name_fr}" target="_blank" class="bg-green-500 text-white px-4 py-2 rounded-lg text-xs font-bold flex items-center gap-1 shadow-sm">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp
                            </a>
                        </div>
                    </div>`;
            });
        }

        // الفلترة
        window.filterByCategory = function(category) {
            currentCategory = category;
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            const id = category === 'Maman & Bébé' ? 'cat-Maman' : 'cat-' + category;
            document.getElementById(id).classList.add('active');

            const filtered = allProducts.filter(p => p.category === category);
            const brands = [...new Set(filtered.map(p => p.brand))].filter(b => b);
            
            const bar = document.getElementById('brands-bar');
            const list = document.getElementById('brands-list');
            bar.classList.remove('hidden');
            list.innerHTML = `<button onclick="filterByBrand('all')" class="brand-pill active">Tout</button>`;
            brands.forEach(b => list.innerHTML += `<button onclick="filterByBrand('${b}')" class="brand-pill">${b}</button>`);

            document.getElementById('section-title').innerText = category;
            renderGrid(filtered);
        };

        window.filterByBrand = function(brand) {
            document.querySelectorAll('.brand-pill').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            let filtered = allProducts.filter(p => p.category === currentCategory);
            if(brand !== 'all') filtered = filtered.filter(p => p.brand === brand);
            renderGrid(filtered);
        };

        function searchProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderGrid(allProducts.filter(p => p.name_fr.toLowerCase().includes(val) || (p.brand && p.brand.toLowerCase().includes(val))));
        }

        // الأدمن
        window.showAdmin = function() { 
            document.getElementById('adminModal').classList.remove('hidden');
            if(isAdmin) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            }
        };
        window.closeAdmin = function() { document.getElementById('adminModal').classList.add('hidden'); };

        async function handleLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if(!error) { isAdmin = true; localStorage.setItem('samy_is_admin', 'true'); location.reload(); }
            else { alert(error.message); }
        }

        async function addProduct() {
            const data = {
                name_fr: document.getElementById('pNameFr').value,
                name_ar: document.getElementById('pNameAr').value,
                price: parseFloat(document.getElementById('pPrice').value),
                brand: document.getElementById('pBrand').value,
                category: document.getElementById('pCat').value,
                img_url: document.getElementById('pImg').value
            };
            const { error } = await supabase.from('products').insert([data]);
            if(!error) location.reload(); else alert(error.message);
        }

        async function deleteProduct(id) {
            if(confirm("Supprimer?")) {
                const { error } = await supabase.from('products').delete().eq('id', id);
                if(!error) { allProducts = allProducts.filter(p => p.id !== id); renderGrid(allProducts); }
            }
        }

        function logout() { supabase.auth.signOut(); localStorage.removeItem('samy_is_admin'); location.reload(); }

        window.onload = fetchProducts;
    </script>
</body>
</html>
