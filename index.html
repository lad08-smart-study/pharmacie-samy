<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHARMACIE SAMY | Admin Panel & Showcase</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --main-blue: #0d47a1; --accent-green: #25d366; }
        body { font-family: 'Inter', 'Noto Sans Arabic', sans-serif; background-color: #fcfdfe; scroll-behavior: smooth; }
        .pharma-blue { color: var(--main-blue); }
        .bg-pharma { background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%); }
        
        /* Hero Section */
        .hero-gradient { 
            background: linear-gradient(to right, rgba(13, 71, 161, 0.9), rgba(13, 71, 161, 0.4)), 
            url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=1920'); 
            background-size: cover; background-position: center; min-height: 500px; display: flex; align-items: center;
        }

        /* التحكم في ظهور أزرار الحذف */
        .delete-btn { 
            position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; 
            width: 40px; height: 40px; border-radius: 50%; display: none; /* مخفي افتراضياً */
            align-items: center; justify-content: center; z-index: 50; border: 3px solid white; cursor: pointer;
        }
        /* تظهر فقط عندما يكون الكلاس is-admin مفعلاً */
        .is-admin .delete-btn { display: flex !important; }

        .product-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border: 1px solid #f1f5f9; background: white; border-radius: 30px; 
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.05); }

        .cat-chip { transition: 0.3s; cursor: pointer; border: 1px solid #f1f5f9; background: white; padding: 12px 24px; border-radius: 15px; font-weight: 900; font-size: 12px; text-transform: uppercase; }
        .cat-chip.active { background: var(--main-blue); color: white; }

        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; items-center; justify-content: center; font-size: 30px; z-index: 1000; shadow: 0 10px 20px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <nav class="bg-white border-b sticky top-0 z-[100] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-pharma p-2 rounded-xl text-white"><i class="fa-solid fa-mortar-pestle text-xl"></i></div>
                <h1 class="text-xl font-black pharma-blue tracking-tighter uppercase">SAMY PHARMA</h1>
            </div>
            <button onclick="showAdminModal()" class="text-gray-300 hover:text-blue-600 transition-all text-2xl">
                <i class="fa-solid fa-fingerprint"></i>
            </button>
        </div>
    </nav>

    <header class="hero-gradient text-white px-6">
        <div class="max-w-7xl mx-auto w-full py-20">
            <h2 class="text-5xl md:text-7xl font-black mb-6 leading-none tracking-tighter uppercase">Stock <br><span class="text-blue-400">Management</span></h2>
            <p class="text-xl opacity-90 mb-10 max-w-lg">Gérez vos produits, prix et catégories en temps réel.</p>
            <a href="#products" class="bg-white text-blue-900 px-10 py-4 rounded-2xl font-black shadow-xl">VOIR LE STOCK</a>
        </div>
    </header>

    <section class="py-6 bg-white border-b overflow-x-auto">
        <div id="categoryContainer" class="max-w-7xl mx-auto px-6 flex gap-3">
            <button onclick="filterCat('Tout', this)" class="cat-chip active">Tout</button>
            <button onclick="filterCat('Dermocosmétique', this)" class="cat-chip">Dermocosmétique</button>
            <button onclick="filterCat('Maman & Bébé', this)" class="cat-chip">Maman & Bébé</button>
            <button onclick="filterCat('Hygiène', this)" class="cat-chip">Hygiène</button>
            <button onclick="filterCat('Santé', this)" class="cat-chip">Santé</button>
        </div>
    </section>

    <main id="products" class="max-w-7xl mx-auto px-6 py-16">
        <div class="flex flex-col md:flex-row justify-between mb-12 gap-6">
            <h2 id="gridTitle" class="text-3xl font-black uppercase tracking-tighter">Catalogue Produits</h2>
            <input type="text" id="searchInput" onkeyup="search()" placeholder="🔍 Rechercher..." class="p-4 bg-gray-50 rounded-2xl border-0 w-full md:max-w-sm outline-none focus:ring-2 ring-blue-600">
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full text-center py-20"><i class="fa-solid fa-spinner animate-spin text-4xl text-blue-600"></i></div>
        </div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/90 hidden z-[2000] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-xl rounded-[40px] p-8 md:p-12 relative overflow-y-auto max-h-[90vh]">
            <button onclick="closeAdminModal()" class="absolute top-6 right-6 text-gray-300 hover:text-black text-4xl">×</button>
            
            <div id="loginSection" class="text-center">
                <h3 class="text-2xl font-black mb-6 uppercase">Accès Administrateur</h3>
                <input type="password" id="adminPin" placeholder="CODE PIN" class="w-full p-6 bg-gray-50 rounded-2xl mb-4 text-center text-2xl font-black tracking-[0.5em] outline-none">
                <button onclick="tryLogin()" class="w-full bg-pharma text-white py-5 rounded-2xl font-black uppercase">Entrer</button>
            </div>

            <div id="adminForm" class="hidden space-y-5">
                <h3 class="text-xl font-black border-b pb-4 uppercase pharma-blue">Ajouter un produit</h3>
                
                <input type="text" id="pName" placeholder="Nom du produit" class="w-full p-4 bg-gray-50 rounded-xl outline-none font-bold">
                <input type="text" id="pBrand" placeholder="Marque (ex: Vichy)" class="w-full p-4 bg-gray-50 rounded-xl outline-none font-bold">
                <input type="number" id="pPrice" placeholder="Prix (DA)" class="w-full p-4 bg-gray-50 rounded-xl outline-none font-black text-blue-700">
                
                <select id="pCat" class="w-full p-4 bg-gray-50 rounded-xl font-bold outline-none">
                    <option>Dermocosmétique</option>
                    <option>Maman & Bébé</option>
                    <option>Hygiène</option>
                    <option>Santé</option>
                </select>

                <div class="border-2 border-dashed rounded-2xl p-6 text-center bg-blue-50/50">
                    <input type="file" id="pFile" accept="image/*" class="w-full text-xs">
                    <p class="text-[10px] text-gray-400 mt-2">Format: JPG, PNG (Max 5MB)</p>
                </div>

                <button onclick="saveToSupabase()" id="saveBtn" class="w-full bg-green-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg">🚀 Publier maintenant</button>
                <button onclick="logout()" class="w-full text-red-500 text-xs font-bold uppercase pt-4 underline">Déconnexion</button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/213770762987" class="whatsapp-float"><i class="fa-brands fa-whatsapp"></i></a>

    <script>
        // --- اعدادات SUPABASE ---
        const SUPABASE_URL = 'YOUR_SUPABASE_URL'; 
        const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let productsData = [];
        let isAdminActive = localStorage.getItem('samy_auth') === 'true';

        // تحميل البيانات عند فتح الصفحة
        window.onload = () => {
            loadProducts();
            if(isAdminActive) {
                document.getElementById('productsGrid').classList.add('is-admin');
            }
        };

        async function loadProducts() {
            const { data, error } = await sb.from('products').select('*').order('created_at', { ascending: false });
            if (error) { console.error(error); return; }
            productsData = data;
            render(productsData);
        }

        function render(items) {
            const grid = document.getElementById('productsGrid');
            if(items.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-400 font-bold uppercase tracking-widest">Aucun produit</p>`;
                return;
            }
            grid.innerHTML = items.map(p => `
                <div class="product-card p-6">
                    <div onclick="deleteItem('${p.id}')" class="delete-btn"><i class="fa-solid fa-trash-can"></i></div>
                    <div class="aspect-square bg-gray-50 rounded-2xl mb-6 flex items-center justify-center p-4">
                        <img src="${p.img_url}" class="max-h-full max-w-full object-contain">
                    </div>
                    <div class="flex-grow">
                        <span class="text-[9px] text-blue-600 font-black uppercase tracking-widest">${p.brand}</span>
                        <h4 class="font-bold text-gray-900 mt-1 uppercase text-sm h-10 overflow-hidden line-clamp-2">${p.name}</h4>
                    </div>
                    <div class="mt-6 flex justify-between items-center pt-4 border-t">
                        <span class="text-2xl font-black pharma-blue">${p.price} <small class="text-[10px]">DA</small></span>
                        <a href="https://wa.me/213770762987?text=Commande: ${p.name}" class="bg-green-500 text-white p-3 rounded-xl shadow-lg hover:scale-110 transition-transform"><i class="fa-brands fa-whatsapp text-xl"></i></a>
                    </div>
                </div>
            `).join('');
        }

        // تسجيل الدخول
        function tryLogin() {
            const pin = document.getElementById('adminPin').value;
            if(pin === "pharmaciesami001") {
                localStorage.setItem('samy_auth', 'true');
                isAdminActive = true;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('adminForm').classList.remove('hidden');
                document.getElementById('productsGrid').classList.add('is-admin'); // يظهر سلة المحذوفات فوراً
                render(productsData);
                alert("Bienvenue Samy ! Mode édition activé.");
            } else {
                alert("PIN Incorrect");
            }
        }

        function logout() {
            localStorage.removeItem('samy_auth');
            location.reload();
        }

        // إضافة منتج جديد مع صورة
        async function saveToSupabase() {
            const file = document.getElementById('pFile').files[0];
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const brand = document.getElementById('pBrand').value;
            const cat = document.getElementById('pCat').value;
            const btn = document.getElementById('saveBtn');

            if(!file || !name || !price) { alert("Remplir tous les champs !"); return; }

            btn.disabled = true;
            btn.innerText = "CHARGEMENT...";

            try {
                // 1. رفع الصورة
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: upErr } = await sb.storage.from('product-images').upload(fileName, file);
                if(upErr) throw upErr;

                // 2. جلب رابط الصورة
                const { data: urlData } = sb.storage.from('product-images').getPublicUrl(fileName);

                // 3. حفظ في الجدول
                const { error: dbErr } = await sb.from('products').insert([{
                    name: name,
                    brand: brand,
                    price: price,
                    category: cat,
                    img_url: urlData.publicUrl
                }]);

                if(dbErr) throw dbErr;

                alert("Produit ajouté avec succès !");
                location.reload();
            } catch (err) {
                alert("Erreur: " + err.message);
                btn.disabled = false;
                btn.innerText = "PUBLIER";
            }
        }

        // حذف منتج
        async function deleteItem(id) {
            if(confirm("Supprimer définitivement ce produit ?")) {
                const { error } = await sb.from('products').delete().eq('id', id);
                if(!error) {
                    productsData = productsData.filter(p => p.id !== id);
                    render(productsData);
                } else {
                    alert("Erreur lors de la suppression");
                }
            }
        }

        // فلاتر وبحث
        function filterCat(c, btn) {
            document.querySelectorAll('.cat-chip').forEach(ch => ch.classList.remove('active'));
            btn.classList.add('active');
            const filtered = (c === 'Tout') ? productsData : productsData.filter(p => p.category === c);
            render(filtered);
        }

        function search() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            const filtered = productsData.filter(p => p.name.toLowerCase().includes(v) || p.brand.toLowerCase().includes(v));
            render(filtered);
        }

        function showAdminModal() { document.getElementById('adminModal').classList.remove('hidden'); if(isAdminActive) { document.getElementById('loginSection').classList.add('hidden'); document.getElementById('adminForm').classList.remove('hidden'); } }
        function closeAdminModal() { document.getElementById('adminModal').classList.add('hidden'); }
    </script>
</body>
</html>
