<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACIE SAMY - Premium Showcase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', 'Noto Sans Arabic', sans-serif; background-color: #f8fafc; }
        .pharma-blue { color: #0d47a1; }
        .bg-pharma { background-color: #0d47a1; }
        .card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body>

    <nav class="bg-white shadow-sm border-b sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold pharma-blue tracking-tighter">PHARMACIE SAMY</h1>
            <div class="space-x-4 flex items-center">
                <button onclick="switchLang('fr')" class="text-sm font-semibold">FR</button>
                <button onclick="switchLang('ar')" class="text-sm font-semibold">AR</button>
                <button onclick="showAdmin()" class="bg-gray-100 px-4 py-2 rounded-lg text-sm">Admin</button>
            </div>
        </div>
    </nav>

    <header class="bg-pharma text-white py-16 px-4 text-center">
        <h2 id="hero-title" class="text-4xl md:text-5xl font-bold mb-4">PHARMACIE SAMY</h2>
        <p id="hero-sub" class="text-blue-100 text-lg max-w-2xl mx-auto">Votre destination premium pour la dermocosmétique et le bien-être.</p>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-10">
        
        <div class="mb-10">
            <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Rechercher un produit, une marque..." 
                   class="w-full p-4 rounded-2xl border-2 border-gray-100 focus:border-blue-600 outline-none shadow-sm text-lg">
        </div>

        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <p class="col-span-full text-center text-gray-400">Chargement des produits...</p>
        </div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 relative">
            <button onclick="closeAdmin()" class="absolute top-4 right-4 text-2xl">&times;</button>
            
            <div id="loginArea">
                <h3 class="text-2xl font-bold mb-6">Connexion Admin</h3>
                <input type="email" id="adminEmail" placeholder="Email" class="w-full p-3 border rounded-lg mb-4">
                <input type="password" id="adminPass" placeholder="Password" class="w-full p-3 border rounded-lg mb-6">
                <button onclick="handleLogin()" class="w-full bg-pharma text-white py-3 rounded-xl font-bold">Entrer</button>
            </div>

            <div id="adminPanel" class="hidden">
                <h3 class="text-2xl font-bold mb-6">Ajouter un Produit</h3>
                <div class="grid gap-4">
                    <input type="text" id="pNameFr" placeholder="Nom du produit (FR)" class="p-3 border rounded-lg">
                    <input type="text" id="pNameAr" placeholder="اسم المنتج (AR)" class="p-3 border rounded-lg text-right">
                    <input type="number" id="pPrice" placeholder="Prix (DA)" class="p-3 border rounded-lg">
                    <input type="text" id="pBrand" placeholder="Marque" class="p-3 border rounded-lg">
                    <select id="pCat" class="p-3 border rounded-lg">
                        <option value="Dermocosmétique">Dermocosmétique</option>
                        <option value="Maman & Bébé">Maman & Bébé</option>
                        <option value="Hygiène">Hygiène</option>
                    </select>
                    <input type="text" id="pImg" placeholder="URL de l'image (Firebase URL)" class="p-3 border rounded-lg">
                    <button onclick="addProduct()" class="bg-green-600 text-white py-4 rounded-xl font-bold">Publier</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-t py-10 text-center">
        <p class="text-gray-500 text-sm">© 2026 PHARMACIE SAMY. Designed for Excellence.</p>
    </footer>

    <script>
        // 1. Firebase Configuration (Direct implementation)
        const firebaseConfig = {
            apiKey: "AIzaSyDXOljj0H5909iVD-0hMbIVsF_pjzSDtBg",
            authDomain: "pharmacie-samy.firebaseapp.com",
            projectId: "pharmacie-samy",
            storageBucket: "pharmacie-samy.firebasestorage.app",
            messagingSenderId: "178950700829",
            appId: "1:178950700829:web:e0b657ee0b206c2f642bf4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentLocale = 'fr';

        // 2. Core Functions
        async function loadProducts() {
            const grid = document.getElementById('productsGrid');
            const snapshot = await db.collection('products').orderBy('createdAt', 'desc').get();
            grid.innerHTML = '';

            snapshot.forEach(doc => {
                const p = doc.data();
                const name = currentLocale === 'ar' ? (p.name_ar || p.name_fr) : p.name_fr;
                const waMsg = encodeURIComponent(`Bonjour, je veux réserver: ${p.name_fr} (${p.price} DA)`);
                
                grid.innerHTML += `
                    <div class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 card flex flex-col">
                        <img src="${p.images || 'https://via.placeholder.com/200'}" class="h-48 w-full object-contain mb-4">
                        <p class="text-[10px] text-blue-600 font-bold uppercase">${p.brand}</p>
                        <h4 class="font-bold text-gray-800 text-sm h-10 overflow-hidden">${name}</h4>
                        <p class="text-lg font-bold pharma-blue mt-2">${p.price} DA</p>
                        <a href="https://wa.me/213770762987?text=${waMsg}" target="_blank" 
                           class="mt-4 block text-center bg-green-500 text-white py-2 rounded-lg text-xs font-bold hover:bg-green-600 transition-colors">
                           WhatsApp
                        </a>
                    </div>
                `;
            });
        }

        async function addProduct() {
            const data = {
                name_fr: document.getElementById('pNameFr').value,
                name_ar: document.getElementById('pNameAr').value,
                price: document.getElementById('pPrice').value,
                brand: document.getElementById('pBrand').value,
                category: document.getElementById('pCat').value,
                images: document.getElementById('pImg').value,
                createdAt: new Date().toISOString(),
                keywords: [document.getElementById('pNameFr').value.toLowerCase(), document.getElementById('pBrand').value.toLowerCase()]
            };
            await db.collection('products').add(data);
            alert("Produit ajouté !");
            closeAdmin();
            loadProducts();
        }

        function searchProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.querySelectorAll('#productsGrid > div');
            cards.forEach(card => {
                let txt = card.textContent.toLowerCase();
                card.style.display = txt.includes(input) ? "flex" : "none";
            });
        }

        // 3. UI Helpers
        function showAdmin() { document.getElementById('adminModal').classList.remove('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        
        async function handleLogin() {
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            } catch(e) { alert("Erreur d'authentification"); }
        }

        function switchLang(lang) {
            currentLocale = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            document.getElementById('hero-title').innerText = lang === 'ar' ? 'صيدلية سامي' : 'PHARMACIE SAMY';
            loadProducts();
        }

        // Init
        loadProducts();
    </script>
</body>
</html>
