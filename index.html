<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHARMACIE SAMY | Officiel</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; scroll-behavior: smooth; }
        
        /* الهيرو المحدث لجعل الاسم بارزاً جداً */
        .hero-section { 
            background: linear-gradient(to bottom, rgba(13, 71, 161, 0.9), rgba(13, 71, 161, 0.7)), 
            url('https://images.unsplash.com/photo-1586015555751-63bb77f4322a?q=80&w=1920'); 
            background-size: cover; background-position: center; min-height: 700px; 
            display: flex; align-items: center; justify-content: center; text-align: center;
            clip-path: ellipse(160% 100% at 50% 0%);
        }

        .cat-btn { transition: all 0.3s ease; cursor: pointer; border: 2px solid #e2e8f0; white-space: nowrap; }
        .cat-btn.active { background-color: #1e3a8a; color: white; border-color: #1e3a8a; transform: scale(1.05); shadow: 0 10px 15px rgba(0,0,0,0.1); }

        .product-card { 
            transition: all 0.4s ease; border-radius: 35px; background: white; 
            position: relative; overflow: hidden; border: 1px solid #f1f5f9; 
        }
        .product-card:hover { transform: translateY(-15px); shadow: 0 25px 50px -12px rgba(0,0,0,0.1); }

        /* زر الحذف للأدمن */
        .delete-btn { 
            position: absolute; top: 15px; right: 15px; background: #ff4d4d; color: white; 
            width: 40px; height: 40px; border-radius: 50%; display: none; 
            align-items: center; justify-content: center; z-index: 50; cursor: pointer; border: 2px solid white;
        }
        .is-admin .delete-btn { display: flex; }

        /* زر البصمة ليكون تفاعلياً */
        #adminTrigger { cursor: pointer !important; transition: transform 0.2s; z-index: 110; position: relative; }
        #adminTrigger:active { transform: scale(0.9); }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #0d47a1; border-radius: 50%; width: 25px; height: 25px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav class="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-[100] px-6 py-4 flex justify-between items-center border-b">
        <div class="flex items-center gap-3">
            <div class="bg-blue-900 p-2 rounded-xl text-white shadow-lg"><i class="fa-solid fa-mortar-pestle text-xl"></i></div>
            <h1 class="text-xl font-black text-blue-950 uppercase tracking-tighter">PHARMACIE SAMY</h1>
        </div>
        <button id="adminTrigger" onclick="showAdmin()" class="bg-gray-100 p-3 rounded-full hover:bg-blue-900 group transition-all">
            <i class="fa-solid fa-fingerprint text-gray-500 group-hover:text-white text-2xl"></i>
        </button>
    </nav>

    <header class="hero-section text-white px-6">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-7xl md:text-9xl font-black mb-6 tracking-[ -0.05em] uppercase leading-none">
                PHARMACIE <br> <span class="text-blue-300">SAMY</span>
            </h2>
            <p class="text-xl md:text-2xl opacity-90 mb-10 font-medium">Votre santé, notre priorité absolue à Les Sources.</p>
            <div class="flex flex-wrap justify-center gap-4">
                <a href="#catalog" class="bg-white text-blue-900 px-10 py-5 rounded-2xl font-black shadow-xl hover:scale-105 transition-all">VOIR CATALOGUE</a>
                <a href="https://wa.me/213770762987" class="bg-green-500 text-white px-8 py-5 rounded-2xl font-black flex items-center gap-3 shadow-xl hover:bg-green-600 transition-all">
                    <i class="fa-brands fa-whatsapp text-2xl"></i> CONTACTER
                </a>
            </div>
        </div>
    </header>

    <main id="catalog" class="max-w-7xl mx-auto px-6 py-20">
        <div class="flex flex-col gap-10 mb-16">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <h2 class="text-4xl font-black text-blue-950 uppercase tracking-tighter">Nos Produits</h2>
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Rechercher une marque (Vichy, CeraVe...)" class="w-full max-w-md p-5 border-2 border-gray-100 rounded-2xl outline-none focus:border-blue-900 shadow-sm bg-white font-medium">
            </div>

            <div class="flex flex-wrap gap-3 overflow-x-auto pb-4 no-scrollbar">
                <button onclick="filterCat('All', this)" class="cat-btn active bg-white px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-sm">Tous</button>
                <button onclick="filterCat('Mère et Enfant', this)" class="cat-btn bg-white px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-sm">Mère et Enfant</button>
                <button onclick="filterCat('Dermo-cosmétique', this)" class="cat-btn bg-white px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-sm">Dermo-cosmétique</button>
                <button onclick="filterCat('Soins Dentaires', this)" class="cat-btn bg-white px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-sm">Soins Dentaires</button>
                <button onclick="filterCat('Compléments Alimentaires', this)" class="cat-btn bg-white px-8 py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-sm">Compléments Alimentaires</button>
            </div>
        </div>

        <div id="productsGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-8">
            <div class="col-span-full py-20 text-center"><div class="loader mx-auto"></div></div>
        </div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/60 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xl rounded-[40px] p-10 shadow-2xl relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeAdmin()" class="absolute top-6 right-8 text-3xl text-gray-400 hover:text-black">&times;</button>
            
            <div id="loginArea">
                <h3 class="text-2xl font-black text-blue-950 text-center mb-8 uppercase">Administration</h3>
                <input type="password" id="adminPass" placeholder="Entrez le code" class="w-full p-6 bg-gray-50 rounded-2xl mb-6 text-center text-3xl font-black outline-none border-2 border-transparent focus:border-blue-900">
                <button onclick="handleLogin()" class="w-full bg-blue-900 text-white py-6 rounded-2xl font-black shadow-lg">ENTRER</button>
            </div>

            <div id="adminPanel" class="hidden space-y-5">
                <h3 class="text-xl font-black text-blue-950 border-b pb-4">AJOUTER PRODUIT</h3>
                <input type="text" id="pName" placeholder="Nom du produit" class="w-full p-4 bg-gray-50 rounded-xl border outline-none font-bold">
                <input type="text" id="pBrand" placeholder="Marque" class="w-full p-4 bg-gray-50 rounded-xl border outline-none font-bold">
                <input type="number" id="pPrice" placeholder="Prix (DA)" class="w-full p-4 bg-gray-50 rounded-xl border outline-none font-black text-xl text-blue-900">
                <select id="pCat" class="w-full p-4 bg-gray-50 rounded-xl border font-black uppercase text-xs">
                    <option value="Mère et Enfant">Mère et Enfant</option>
                    <option value="Dermo-cosmétique">Dermo-cosmétique</option>
                    <option value="Soins Dentaires">Soins Dentaires</option>
                    <option value="Compléments Alimentaires">Compléments Alimentaires</option>
                </select>
                <div class="border-2 border-dashed border-gray-200 p-6 rounded-2xl text-center">
                    <input type="file" id="pImgFile" accept="image/*" class="w-full text-xs font-bold">
                </div>
                <button onclick="uploadProduct()" id="saveBtn" class="w-full bg-blue-900 text-white py-5 rounded-2xl font-black text-lg shadow-xl">🚀 PUBLIER SUR LE SITE</button>
                <button onclick="logoutAdmin()" class="w-full text-red-500 text-[10px] font-black uppercase mt-10">Déconnexion</button>
            </div>
        </div>
    </div>

    <a href="https://wa.me/213770762987" class="fixed bottom-8 right-8 bg-green-500 text-white w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-2xl z-[60] hover:scale-110 transition-transform">
        <i class="fa-brands fa-whatsapp"></i>
    </a>

    <script>
        // --- Supabase Config ---
        const SB_URL = 'YOUR_SUPABASE_URL'; 
        const SB_KEY = 'YOUR_SUPABASE_ANON_KEY';
        const supabase = supabase.createClient(SB_URL, SB_KEY);

        let allProducts = [];
        let isAdmin = localStorage.getItem('samy_admin_session') === 'true';

        async function fetchProducts() {
            const { data, error } = await supabase.from('products').select('*').order('created_at', { ascending: false });
            if (error) return;
            allProducts = data || [];
            renderGrid(allProducts);
        }

        function renderGrid(products) {
            const grid = document.getElementById('productsGrid');
            if(products.length === 0) { grid.innerHTML = `<p class="col-span-full py-20 text-gray-400 font-bold uppercase tracking-widest text-center">Aucun produit trouvé</p>`; return; }
            
            grid.innerHTML = products.map(p => `
                <div class="product-card p-6 ${isAdmin ? 'is-admin' : ''}">
                    <div onclick="deleteProduct('${p.id}')" class="delete-btn"><i class="fa-solid fa-trash-can"></i></div>
                    <div class="aspect-square bg-gray-50 rounded-[30px] mb-6 overflow-hidden flex items-center justify-center p-6">
                        <img src="${p.img_url}" class="max-h-full max-w-full object-contain transition-transform duration-700 hover:scale-110">
                    </div>
                    <div class="flex-grow">
                        <span class="text-[10px] text-blue-600 font-black uppercase tracking-[0.2em] mb-2 block opacity-60">${p.brand}</span>
                        <h4 class="font-bold text-blue-950 text-base leading-tight h-10 overflow-hidden uppercase tracking-tighter">${p.name}</h4>
                    </div>
                    <div class="mt-6 pt-5 border-t border-gray-50 flex justify-between items-center">
                        <span class="text-xl font-black text-blue-900 tracking-tighter">${p.price} <small class="text-[10px] opacity-50">DA</small></span>
                        <a href="https://wa.me/213770762987?text=Commande: ${p.name}" class="bg-green-500 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md"><i class="fa-brands fa-whatsapp text-xl"></i></a>
                    </div>
                </div>
            `).join('');
        }

        // إصلاح الفلترة: عند الضغط يتم تصفية المنتجات مباشرة
        function filterCat(cat, btn) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if(cat === 'All') {
                renderGrid(allProducts);
            } else {
                const filtered = allProducts.filter(p => p.category === cat);
                renderGrid(filtered);
            }
        }

        function searchProducts() {
            const v = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(v) || p.brand.toLowerCase().includes(v));
            renderGrid(filtered);
        }

        // نظام الأدمن المصلح
        function handleLogin() {
            if(document.getElementById('adminPass').value === "pharmaciesami001") {
                isAdmin = true;
                localStorage.setItem('samy_admin_session', 'true');
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderGrid(allProducts);
            } else { alert("Code incorrect !"); }
        }

        function showAdmin() {
            document.getElementById('adminModal').classList.remove('hidden');
            if(isAdmin) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            }
        }

        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); }
        function logoutAdmin() { localStorage.removeItem('samy_admin_session'); location.reload(); }

        async function uploadProduct() {
            const file = document.getElementById('pImgFile').files[0];
            const btn = document.getElementById('saveBtn');
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const brand = document.getElementById('pBrand').value;
            const cat = document.getElementById('pCat').value;

            if(!file || !name || !price || !brand) return alert("Remplissez tous les champs !");
            btn.disabled = true; btn.innerHTML = "Téléchargement...";

            try {
                const fileName = Date.now() + "_" + file.name;
                const { data: imgData } = await supabase.storage.from('product-images').upload(fileName, file);
                const { data: urlData } = supabase.storage.from('product-images').getPublicUrl(fileName);

                await supabase.from('products').insert([{
                    name: name, brand: brand, price: price, category: cat, img_url: urlData.publicUrl
                }]);
                location.reload();
            } catch (e) { alert("Erreur !"); btn.disabled = false; btn.innerHTML = "Réessayer"; }
        }

        async function deleteProduct(id) {
            if(confirm("Supprimer ce produit ?")) {
                await supabase.from('products').delete().eq('id', id);
                location.reload();
            }
        }

        window.onload = fetchProducts;
    </script>
</body>
</html>
