<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACIE SAMY | صيدلية سامي</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            /* صورة المرأة التي تستعمل الكوسميتيك في الخلفية */
            background: linear-gradient(rgba(255, 255, 255, 0.7), rgba(255, 255, 255, 0.7)), 
                        url('https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            color: #333;
        }

        /* تنسيق الهيدر */
        header {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 15px;
            margin: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .logo { font-size: 24px; font-weight: bold; color: #065f46; display: flex; align-items: center; gap: 10px; }
        .lock-btn { background: #ecfdf5; border: none; padding: 10px; border-radius: 50%; color: #059669; cursor: pointer; }

        /* لوحة التحكم */
        #adminPanel {
            display: none; /* مخفية افتراضياً */
            background: rgba(255, 255, 255, 0.95);
            margin: 20px;
            padding: 25px;
            border-radius: 25px;
            border: 2px solid #10b981;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        input, select {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            outline: none;
            font-family: 'Tajawal', sans-serif;
        }

        .save-btn {
            background: #10b981;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* شبكة المنتجات */
        .products-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); }
        .card img { width: 100%; h-40; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .card h4 { font-size: 16px; margin-bottom: 5px; }
        .card .price { color: #059669; font-weight: bold; font-size: 18px; }
        .card .brand { font-size: 12px; color: #888; margin-bottom: 5px; }
        .card .cat { font-size: 10px; background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 10px; }

        /* تذييل الصفحة - أزرار التواصل */
        footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            padding: 10px 30px;
            border-radius: 50px;
            display: flex;
            gap: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 2000;
        }

        footer a { font-size: 28px; transition: 0.3s; }
        footer a.wa { color: #25D366; }
        footer a.ig { color: #E1306C; }
        footer a.tk { color: #000; }
        footer a.map { color: #4285F4; }

    </style>
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-clinic-medical"></i> PHARMACIE SAMY
        </div>
        <button class="lock-btn" onclick="openAdmin()">
            <i class="fas fa-lock"></i>
        </button>
    </header>

    <main>
        <div id="adminPanel">
            <h3 style="margin-bottom:15px; color:#065f46;">إضافة منتج جديد</h3>
            <div class="form-grid">
                <input type="text" id="name" placeholder="إسم المنتج">
                <input type="text" id="brand" placeholder="الماركة">
                <input type="number" id="price" placeholder="السعر (د.ج)">
                <select id="cat">
                    <option value="كوسميتيك">كوسميتيك</option>
                    <option value="أدوية">أدوية</option>
                    <option value="بشرة">عناية بشرة</option>
                </select>
            </div>
            <input type="file" id="image" style="margin-bottom: 15px;">
            <button class="save-btn" id="saveBtn" onclick="saveProduct()">حفظ في قاعدة البيانات</button>
        </div>

        <div class="products-container" id="grid">
            </div>
    </main>

    <footer>
        <a href="https://wa.me/213770762987" class="wa"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/pharmaciesamy/" class="ig"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@pharmacie.samy" class="tk"><i class="fab fa-tiktok"></i></a>
        <a href="https://share.google/1uSFRbdMSAfgNZSUU" class="map"><i class="fas fa-map-marker-alt"></i></a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXOljj0H5909ivD-OhMbIVsF_pjzSDtBg",
            authDomain: "pharmacie-samy.firebaseapp.com",
            projectId: "pharmacie-samy",
            storageBucket: "pharmacie-samy.firebasestorage.app",
            messagingSenderId: "178950700829",
            appId: "1:178950700829:web:1d5f72f25352c3fe642bf4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const storage = getStorage(app);

        // فتح لوحة الإدارة بالرمز
        window.openAdmin = () => {
            const pass = prompt("أدخل الرمز السري:");
            if (pass === "pharmaciesami001") {
                document.getElementById('adminPanel').style.display = "block";
            } else { alert("خطأ!"); }
        };

        // حفظ البيانات
        window.saveProduct = async () => {
            const n = document.getElementById('name').value;
            const b = document.getElementById('brand').value;
            const p = document.getElementById('price').value;
            const c = document.getElementById('cat').value;
            const img = document.getElementById('image').files[0];

            if (!n || !img) return alert("أكمل البيانات");

            document.getElementById('saveBtn').innerText = "جاري الحفظ...";

            try {
                const sRef = ref(storage, `sam/${Date.now()}`);
                await uploadBytes(sRef, img);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "meds"), { name: n, brand: b, price: p, cat: c, img: url });
                alert("تم الحفظ!");
                location.reload();
            } catch (e) { alert("خطأ في Firebase"); }
        };

        // عرض البيانات
        onSnapshot(collection(db, "meds"), (snap) => {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            snap.forEach((d) => {
                const item = d.data();
                grid.innerHTML += `
                    <div class="card">
                        <img src="${item.img}">
                        <span class="cat">${item.cat}</span>
                        <h4>${item.name}</h4>
                        <p class="brand">${item.brand}</p>
                        <p class="price">${item.price} د.ج</p>
                        <button onclick="delItem('${d.id}')" style="background:none; border:none; color:#ccc; cursor:pointer;"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            });
        });

        window.delItem = async (id) => {
            if(prompt("الرمز للحذف:") === "pharmaciesami001") await deleteDoc(doc(db, "meds", id));
        };
    </script>
</body>
</html>
