<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACIE SAMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        /* إعدادات الخلفية الثابتة */
        body {
            margin: 0; font-family: 'Tajawal', sans-serif;
            background: linear-gradient(rgba(0,68,50,0.8), rgba(0,68,50,0.8)), 
                        url('https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?q=80&w=1500');
            background-size: cover; background-attachment: fixed; color: #fff;
        }

        /* الهيدر */
        header {
            background: #fff; margin: 10px; padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .logo { color: #064e3b; font-weight: 900; font-size: 20px; }

        /* شريط التصنيفات للزبون (هذا ما طلبته للتصفح) */
        .categories-nav {
            display: flex; overflow-x: auto; gap: 10px; padding: 15px; 
            scrollbar-width: none; -ms-overflow-style: none;
        }
        .cat-btn {
            background: rgba(255,255,255,0.2); border: 1px solid #fff; color: #fff;
            padding: 8px 20px; border-radius: 20px; white-space: nowrap; cursor: pointer; font-weight: bold;
        }
        .cat-btn.active { background: #10b981; border-color: #10b981; }

        /* شبكة المنتجات */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .card {
            background: #fff; border-radius: 15px; padding: 10px; color: #333;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .card img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; }
        .card h4 { margin: 8px 0 2px; font-size: 14px; color: #064e3b; }
        .card .price { font-weight: 900; color: #10b981; font-size: 18px; }

        /* لوحة التحكم */
        #adminPanel {
            display: none; background: #fff; color: #333; margin: 10px; padding: 20px;
            border-radius: 15px; border: 3px solid #10b981;
        }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; }

        /* أزرار التواصل */
        .footer {
            position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
            background: #fff; padding: 10px 30px; border-radius: 40px; display: flex; gap: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">PHARMACIE SAMY</div>
    <button onclick="checkPass()" style="background:none; border:none; font-size:20px; color:#064e3b;"><i class="fas fa-lock"></i></button>
</header>

<div id="adminPanel">
    <h3>إضافة منتج</h3>
    <input type="text" id="n" placeholder="الاسم">
    <input type="text" id="b" placeholder="الماركة">
    <input type="number" id="p" placeholder="السعر">
    <select id="c">
        <option value="الكل">اختر الفئة</option>
        <option>درمو-كوسميتيك</option>
        <option>الأم والطفل</option>
        <option>مكملات غذائية</option>
        <option>العناية بالأسنان</option>
        <option>أدوية</option>
    </select>
    <input type="file" id="f">
    <button onclick="upload()" id="upBtn" style="width:100%; padding:15px; background:#064e3b; color:#fff; border:none; border-radius:10px;">حفظ المنتج</button>
</div>

<div class="categories-nav" id="catBar">
    <button class="cat-btn active" onclick="filterItems('الكل')">الكل</button>
    <button class="cat-btn" onclick="filterItems('درمو-كوسميتيك')">درمو-كوسميتيك</button>
    <button class="cat-btn" onclick="filterItems('الأم والطفل')">الأم والطفل</button>
    <button class="cat-btn" onclick="filterItems('مكملات غذائية')">مكملات</button>
    <button class="cat-btn" onclick="filterItems('العناية بالأسنان')">الأسنان</button>
    <button class="cat-btn" onclick="filterItems('أدوية')">أدوية</button>
</div>

<div class="grid" id="mainGrid"></div>

<footer class="footer">
    <a href="https://wa.me/213770762987" style="color:#25D366; font-size:25px;"><i class="fab fa-whatsapp"></i></a>
    <a href="https://www.instagram.com/pharmaciesamy/" style="color:#E1306C; font-size:25px;"><i class="fab fa-instagram"></i></a>
    <a href="https://www.tiktok.com/@pharmacie.samy" style="color:#000; font-size:25px;"><i class="fab fa-tiktok"></i></a>
    <a href="https://share.google/1uSFRbdMSAfgNZSUU" style="color:#4285F4; font-size:25px;"><i class="fas fa-map-marker-alt"></i></a>
</footer>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDXOljj0H5909ivD-OhMbIVsF_pjzSDtBg",
        authDomain: "pharmacie-samy.firebaseapp.com",
        projectId: "pharmacie-samy",
        storageBucket: "pharmacie-samy.firebasestorage.app",
        messagingSenderId: "178950700829",
        appId: "1:178950700829:web:1d5f72f25352c3fe642bf4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const st = getStorage(app);
    let allMeds = [];

    window.checkPass = () => {
        if(prompt("كلمة السر:") === "pharmaciesami001") document.getElementById('adminPanel').style.display='block';
    };

    window.upload = async () => {
        const btn = document.getElementById('upBtn');
        btn.disabled = true; btn.innerText = "جاري الحفظ...";
        try {
            const file = document.getElementById('f').files[0];
            const sRef = ref(st, `items/${Date.now()}`);
            await uploadBytes(sRef, file);
            const url = await getDownloadURL(sRef);
            await addDoc(collection(db, "meds"), {
                name: document.getElementById('n').value,
                brand: document.getElementById('b').value,
                price: document.getElementById('p').value,
                cat: document.getElementById('c').value,
                img: url, time: Date.now()
            });
            location.reload();
        } catch (e) { alert("خطأ في Firebase!"); btn.disabled = false; }
    };

    onSnapshot(query(collection(db, "meds"), orderBy("time", "desc")), (snap) => {
        allMeds = [];
        snap.forEach(doc => allMeds.push(doc.data()));
        renderMeds(allMeds);
    });

    function renderMeds(data) {
        const g = document.getElementById('mainGrid');
        g.innerHTML = data.map(i => `
            <div class="card">
                <img src="${i.img}">
                <div style="font-size:10px; color:#777; margin-top:5px;">${i.cat}</div>
                <h4>${i.name}</h4>
                <div class="price">${i.price} DA</div>
            </div>
        `).join('');
    }

    window.filterItems = (cat) => {
        // تحديث شكل الأزرار
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        
        if(cat === 'الكل') return renderMeds(allMeds);
        const filtered = allMeds.filter(m => m.cat === cat);
        renderMeds(filtered);
    };
</script>
</body>
</html>
