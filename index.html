<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACIE SAMY | النسخة الاحترافية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh;
        }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.4); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-10px); }
        .admin-panel { border: 3px solid #10b981; }
        /* أنيميشن للحفظ */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <header class="container mx-auto mt-6 px-4">
        <div class="glass p-5 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-3">
                <div class="bg-emerald-600 p-3 rounded-2xl text-white shadow-lg">
                    <i class="fas fa-clinic-medical text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-emerald-900 leading-none">PHARMACIE SAMY</h1>
                    <span class="text-[10px] text-emerald-600 font-bold uppercase tracking-widest">Premium Store</span>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="langBtn" onclick="toggleLanguage()" class="bg-emerald-100 text-emerald-700 px-4 py-2 rounded-xl font-bold text-sm hover:bg-emerald-200 transition">Français</button>
                <button onclick="handleAdminAuth()" class="w-12 h-12 rounded-xl bg-white flex items-center justify-center text-emerald-600 shadow-lg border border-emerald-100 hover:scale-110 transition">
                    <i class="fas fa-fingerprint text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 mt-10">
        <section id="adminArea" class="hidden mb-16 animate-in fade-in zoom-in duration-300">
            <div class="glass p-8 admin-panel shadow-2xl">
                <h2 id="adminTitle" class="text-2xl font-bold text-emerald-900 mb-8 border-r-8 border-emerald-500 pr-4">إضافة منتج جديد للرفوف</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                    <input type="text" id="pName" placeholder="إسم المنتج" class="p-4 rounded-2xl ring-2 ring-gray-100 outline-none focus:ring-emerald-500 bg-gray-50">
                    <input type="text" id="pBrand" placeholder="الماركة (Brand)" class="p-4 rounded-2xl ring-2 ring-gray-100 outline-none focus:ring-emerald-500 bg-gray-50">
                    <input type="number" id="pPrice" placeholder="السعر (د.ج)" class="p-4 rounded-2xl ring-2 ring-gray-100 outline-none focus:ring-emerald-500 bg-gray-50">
                    
                    <select id="pCat" class="p-4 rounded-2xl ring-2 ring-gray-100 outline-none focus:ring-emerald-500 bg-white font-bold text-gray-700">
                        <option value="درمو كوسميتيك">درمو كوسميتيك (Dermo-Cosmétique)</option>
                        <option value="الأم والطفل">الأم والطفل (Maman & Bébé)</option>
                        <option value="مكملات غذائية">مكملات غذائية (Compléments)</option>
                        <option value="العناية بالأسنان">العناية بالأسنان (Dentaire)</option>
                        <option value="عناية بالشعر">عناية بالشعر (Cheveux)</option>
                        <option value="أدوية">أدوية (Médicaments)</option>
                    </select>
                    
                    <div class="lg:col-span-2">
                        <input type="file" id="pImg" class="w-full p-3 bg-white rounded-2xl ring-2 ring-gray-100 cursor-pointer">
                    </div>
                </div>
                <button onclick="uploadProduct()" id="saveBtn" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold text-xl shadow-xl hover:bg-emerald-700 transition flex items-center justify-center gap-3">
                    <i class="fas fa-cloud-upload-alt"></i> 
                    <span id="btnText">تأكيد ونشر المنتج</span>
                </button>
            </div>
        </section>

        <div id="productsGrid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
    </main>

    <footer class="fixed bottom-6 left-4 right-4 z-50">
        <div class="glass p-4 flex justify-around items-center max-w-lg mx-auto shadow-2xl border-t-2 border-white/50">
            <a href="https://wa.me/213770762987" target="_blank" class="text-green-500 text-3xl hover:scale-125 transition"><i class="fab fa-whatsapp"></i></a>
            <a href="https://www.instagram.com/pharmaciesamy/" target="_blank" class="text-pink-600 text-3xl hover:scale-125 transition"><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@pharmacie.samy" target="_blank" class="text-black text-3xl hover:scale-125 transition"><i class="fab fa-tiktok"></i></a>
            <a href="https://share.google/1uSFRbdMSAfgNZSUU" target="_blank" class="text-blue-600 text-3xl hover:scale-125 transition"><i class="fas fa-map-marker-alt"></i></a>
        </div>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXOljj0H5909ivD-OhMbIVsF_pjzSDtBg",
            authDomain: "pharmacie-samy.firebaseapp.com",
            projectId: "pharmacie-samy",
            storageBucket: "pharmacie-samy.firebasestorage.app",
            messagingSenderId: "178950700829",
            appId: "1:178950700829:web:1d5f72f25352c3fe642bf4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const st = getStorage(app);

        // تبديل اللغة
        window.toggleLanguage = () => {
            const isAr = document.documentElement.dir === "rtl";
            document.documentElement.dir = isAr ? "ltr" : "rtl";
            document.getElementById('langBtn').innerText = isAr ? "العربية" : "Français";
        };

        // الدخول للإدارة
        window.handleAdminAuth = () => {
            if (prompt("ADMIN PASSWORD:") === "pharmaciesami001") {
                document.getElementById('adminArea').classList.toggle('hidden');
            } else { alert("ACCESS DENIED"); }
        };

        // وظيفة الرفع (المصلحة)
        window.uploadProduct = async () => {
            const name = document.getElementById('pName').value;
            const brand = document.getElementById('pBrand').value;
            const price = document.getElementById('pPrice').value;
            const cat = document.getElementById('pCat').value;
            const file = document.getElementById('pImg').files[0];
            const btn = document.getElementById('saveBtn');
            const btnText = document.getElementById('btnText');

            if (!name || !price || !file) return alert("أكمل البيانات أولاً!");

            btn.disabled = true;
            btnText.innerHTML = '<i class="fas fa-circle-notch spinner"></i> جاري الحفظ...';

            try {
                // رفع الصورة
                const fileName = `pharmacy_${Date.now()}`;
                const storageRef = ref(st, 'meds/' + fileName);
                
                const uploadTask = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(uploadTask.ref);

                // حفظ البيانات في Firestore
                await addDoc(collection(db, "meds"), {
                    name, brand, price, cat, 
                    img: downloadURL,
                    timestamp: Date.now()
                });

                alert("تم بنجاح!");
                location.reload();
            } catch (error) {
                console.error(error);
                alert("خطأ! تأكد من أن قواعد Firebase Storage مفتوحة.");
                btn.disabled = false;
                btnText.innerText = "تأكيد ونشر المنتج";
            }
        };

        // العرض المباشر
        const q = query(collection(db, "meds"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                grid.innerHTML += `
                    <div class="glass p-4 product-card shadow-xl relative">
                        <img src="${data.img}" class="w-full h-48 object-cover rounded-2xl mb-4">
                        <span class="absolute top-6 left-6 text-[8px] bg-emerald-600 text-white px-3 py-1 rounded-full font-bold uppercase shadow-lg">${data.cat}</span>
                        <h4 class="font-bold text-gray-800 text-lg truncate">${data.name}</h4>
                        <p class="text-xs text-gray-400 italic mb-2">${data.brand}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-emerald-700 font-black text-xl">${data.price} <span class="text-xs">DA</span></p>
                            <button onclick="deleteItem('${docSnap.id}')" class="text-gray-300 hover:text-red-500 transition">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            });
        });

        window.deleteItem = async (id) => {
            if (prompt("أدخل الرمز للحذف:") === "pharmaciesami001") {
                await deleteDoc(doc(db, "meds", id));
            }
        };
    </script>
</body>
</html>
