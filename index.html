<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHARMACIE SAMY | PREMIUM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');
        
        /* إعدادات الألوان الثابتة لضمان عدم ظهور بياض */
        :root {
            --main-green: #064e3b;
            --light-green: #10b981;
            --bg-overlay: rgba(0, 0, 0, 0.6);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            /* خلفية المرأة والكوسميتيك مضمونة */
            background: linear-gradient(var(--bg-overlay), var(--bg-overlay)), 
                        url('https://images.unsplash.com/photo-1596462502278-27bfdc4033c8?q=80&w=2080') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            color: #fff;
        }

        /* الهيدر الاحترافي */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            margin: 15px;
            padding: 15px 25px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .logo-text { color: var(--main-green); font-weight: 900; font-size: 22px; }
        .lang-btn { background: #f0fdf4; color: var(--light-green); border: none; padding: 8px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }

        /* لوحة الإدارة */
        #adminPanel {
            display: none;
            background: white;
            color: #333;
            margin: 20px;
            padding: 25px;
            border-radius: 20px;
            border: 3px solid var(--light-green);
        }

        .inputs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 15px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-family: 'Tajawal'; }

        /* شبكة المنتجات */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 15px;
            color: #333;
            text-align: center;
            transition: 0.3s;
        }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }
        .card h4 { margin: 10px 0 5px; font-weight: 900; }
        .card .brand { font-size: 11px; color: #777; }
        .card .price { font-size: 18px; color: var(--main-green); font-weight: 900; margin-top: 5px; }

        /* أزرار التواصل الأسفل */
        .footer-nav {
            position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
            background: white; padding: 10px 25px; border-radius: 50px;
            display: flex; gap: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.5);
        }
        .footer-nav a { font-size: 25px; }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-text"><i class="fas fa-plus-circle"></i> PHARMACIE SAMY</div>
        <div style="display: flex; gap: 10px;">
            <button class="lang-btn" onclick="document.documentElement.dir='ltr'">Fr</button>
            <button onclick="checkPass()" style="background:none; border:none; font-size:20px; color:var(--main-green); cursor:pointer;"><i class="fas fa-lock"></i></button>
        </div>
    </header>

    <div id="adminPanel">
        <div class="inputs-grid">
            <input type="text" id="n" placeholder="الاسم">
            <input type="text" id="b" placeholder="الماركة">
            <input type="number" id="p" placeholder="السعر">
            <select id="c">
                <option>درمو-كوسميتيك</option>
                <option>الأم والطفل</option>
                <option>مكملات غذائية</option>
                <option>العناية بالأسنان</option>
                <option>أدوية</option>
            </select>
        </div>
        <input type="file" id="f" style="margin-bottom:10px;">
        <button onclick="upload()" id="upBtn" style="width:100%; padding:15px; background:var(--main-green); color:white; border:none; border-radius:10px; font-weight:bold;">حفظ المنتج</button>
    </div>

    <div class="grid" id="mainGrid"></div>

    <footer class="footer-nav">
        <a href="https://wa.me/213770762987" style="color:#25D366;"><i class="fab fa-whatsapp"></i></a>
        <a href="https://www.instagram.com/pharmaciesamy/" style="color:#E1306C;"><i class="fab fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@pharmacie.samy" style="color:#000;"><i class="fab fa-tiktok"></i></a>
        <a href="https://share.google/1uSFRbdMSAfgNZSUU" style="color:#4285F4;"><i class="fas fa-map-marker-alt"></i></a>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXOljj0H5909ivD-OhMbIVsF_pjzSDtBg",
            authDomain: "pharmacie-samy.firebaseapp.com",
            projectId: "pharmacie-samy",
            storageBucket: "pharmacie-samy.firebasestorage.app",
            messagingSenderId: "178950700829",
            appId: "1:178950700829:web:1d5f72f25352c3fe642bf4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const st = getStorage(app);

        window.checkPass = () => {
            if(prompt("PASSWORD:") === "pharmaciesami001") document.getElementById('adminPanel').style.display='block';
        };

        window.upload = async () => {
            const btn = document.getElementById('upBtn');
            btn.disabled = true; btn.innerText = "جاري الحفظ...";
            try {
                const file = document.getElementById('f').files[0];
                const sRef = ref(st, `items/${Date.now()}`);
                await uploadBytes(sRef, file);
                const url = await getDownloadURL(sRef);
                await addDoc(collection(db, "meds"), {
                    name: document.getElementById('n').value,
                    brand: document.getElementById('b').value,
                    price: document.getElementById('p').value,
                    cat: document.getElementById('c').value,
                    img: url, time: Date.now()
                });
                location.reload();
            } catch (e) { alert("خطأ!"); btn.disabled = false; }
        };

        onSnapshot(query(collection(db, "meds"), orderBy("time", "desc")), (snap) => {
            const g = document.getElementById('mainGrid');
            g.innerHTML = '';
            snap.forEach(doc => {
                const i = doc.data();
                g.innerHTML += `<div class="card">
                    <img src="${i.img}">
                    <div style="font-size:9px; background:#eee; padding:2px; border-radius:5px; margin-top:5px;">${i.cat}</div>
                    <h4>${i.name}</h4>
                    <p class="brand">${i.brand}</p>
                    <p class="price">${i.price} DA</p>
                </div>`;
            });
        });
    </script>
</body>
</html>
