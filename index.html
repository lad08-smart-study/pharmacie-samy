<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PHARMACIE SAMY | Premium Showcase</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { --main-blue: #0d47a1; --accent-green: #25d366; }
        body { font-family: 'Inter', 'Noto Sans Arabic', sans-serif; background-color: #fcfdfe; scroll-behavior: smooth; }
        .pharma-blue { color: var(--main-blue); }
        .bg-pharma { background: linear-gradient(135deg, #0d47a1 0%, #1565c0 100%); }
        
        .hero-gradient { 
            background: linear-gradient(to right, rgba(13, 71, 161, 0.9), rgba(13, 71, 161, 0.4)), 
            url('https://images.unsplash.com/photo-1556228578-0d85b1a4d571?q=80&w=1920&auto=format&fit=crop'); 
            background-size: cover; background-position: center; min-height: 650px; display: flex; align-items: center;
        }

        .product-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            border: 1px solid #f1f5f9; background: white; border-radius: 30px; 
            position: relative; overflow: hidden; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-15px); box-shadow: 0 40px 80px rgba(13,71,161,0.12); border-color: var(--main-blue); }
        
        .delete-btn { 
            position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; 
            width: 40px; height: 40px; border-radius: 50%; display: none; align-items: center; justify-content: center; 
            z-index: 50; border: 3px solid white; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .is-admin .delete-btn { display: flex; }
        
        .whatsapp-float { 
            position: fixed; bottom: 30px; right: 30px; background-color: var(--accent-green); 
            color: white; width: 70px; height: 70px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-size: 35px; box-shadow: 0 15px 35px rgba(37,211,102,0.4); 
            z-index: 1000; transition: 0.4s; 
        }
        .whatsapp-float:hover { transform: rotate(360deg) scale(1.1); }

        .cat-chip { transition: 0.3s; cursor: pointer; border: 1px solid #f1f5f9; white-space: nowrap; }
        .cat-chip:hover, .cat-chip.active { background: var(--main-blue); color: white; border-color: var(--main-blue); transform: scale(1.05); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <nav class="bg-white/95 backdrop-blur-2xl shadow-sm border-b sticky top-0 z-[100] px-6 py-5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4 cursor-pointer" onclick="location.reload()">
                <div class="bg-pharma p-3 rounded-2xl shadow-xl shadow-blue-200">
                    <i class="fa-solid fa-mortar-pestle text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black pharma-blue tracking-tighter uppercase leading-none">Pharmacie Samy</h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-ping"></span>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest text-left">Les Sources, Bir Mourad Rais</p>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-6">
                <div class="hidden lg:flex flex-col items-end border-r pr-6 border-gray-100">
                    <span class="text-[11px] font-black text-blue-600 uppercase tracking-widest">Ouvert 7j/7</span>
                    <span class="text-[12px] font-bold text-gray-900 uppercase italic">08:00 — 00:00</span>
                </div>
                <i onclick="showAdmin()" class="fa-solid fa-fingerprint text-gray-200 hover:text-blue-600 cursor-pointer text-3xl transition-all"></i>
            </div>
        </div>
    </nav>

    <header class="hero-gradient text-white flex items-center px-6">
        <div class="max-w-7xl mx-auto w-full py-24">
            <div class="max-w-3xl animate-fade-in">
                <div class="flex flex-wrap gap-3 mb-10">
                    <span class="bg-white/10 backdrop-blur-md text-white px-6 py-2 rounded-full text-[11px] font-black tracking-[0.2em] uppercase border border-white/20">Dermocosmétique Internationale</span>
                    <span class="bg-green-500 text-white px-6 py-2 rounded-full text-[11px] font-black tracking-[0.2em] uppercase shadow-2xl">Service 7j/7</span>
                </div>
                <h2 class="text-6xl md:text-8xl font-black mb-8 leading-[1] tracking-tighter">Votre Beauté,<br>Notre Expertise.</h2>
                <p class="text-blue-50 text-xl md:text-2xl mb-12 opacity-90 leading-relaxed max-w-2xl font-light">
                    Retrouvez-nous à <span class="font-bold border-b-2 border-blue-400">Les Sources</span>.
                </p>
                <div class="flex flex-wrap gap-6">
                    <a href="#products" class="bg-white text-blue-900 px-12 py-6 rounded-[25px] font-black shadow-2xl hover:bg-blue-50 transition transform hover:-translate-y-2 text-center min-w-[220px]">DÉCOUVRIR</a>
                </div>
            </div>
        </div>
    </header>

    <section class="py-12 bg-white overflow-x-auto no-scrollbar border-b">
        <div class="max-w-7xl mx-auto px-6 flex gap-4">
            <div onclick="filterByCategory('Tout')" class="cat-chip active px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-sm">Tout</div>
            <div onclick="filterByCategory('Dermocosmétique')" class="cat-chip px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-sm">Dermocosmétique</div>
            <div onclick="filterByCategory('Maman & Bébé')" class="cat-chip px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-sm">Maman & Bébé</div>
            <div onclick="filterByCategory('Hygiène')" class="cat-chip px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-sm">Hygiène</div>
            <div onclick="filterByCategory('Compléments')" class="cat-chip px-8 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-sm">Santé</div>
        </div>
    </section>

    <main id="products" class="max-w-7xl mx-auto px-6 py-24">
        <div class="flex flex-col md:flex-row justify-between items-end mb-20 gap-10">
            <div class="w-full">
                <h2 id="section-title" class="text-4xl md:text-6xl font-black text-gray-900 tracking-tighter uppercase leading-none">Catalogue</h2>
                <div class="h-3 w-32 bg-pharma rounded-full mt-6 shadow-lg shadow-blue-100"></div>
            </div>
            <div class="w-full md:max-w-md">
                <div class="relative group">
                    <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-300 group-focus-within:text-blue-600 transition-all"></i>
                    <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Rechercher..." 
                           class="w-full p-6 pl-16 rounded-3xl border-2 border-gray-50 focus:border-blue-600 outline-none shadow-sm text-lg transition-all bg-white font-medium">
                </div>
            </div>
        </div>

        <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-12">
            </div>
    </main>

    <div id="adminModal" class="fixed inset-0 bg-black/95 hidden z-[1000] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-2xl rounded-[50px] p-10 md:p-16 shadow-2xl relative overflow-y-auto max-h-[90vh] border border-gray-100">
            <button onclick="closeAdmin()" class="absolute top-10 right-10 text-gray-200 hover:text-black text-5xl font-light transition-colors">×</button>
            
            <div id="loginArea">
                <div class="text-center mb-12">
                    <div class="w-20 h-20 bg-blue-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
                        <i class="fa-solid fa-shield-halved text-3xl pharma-blue"></i>
                    </div>
                    <h3 class="text-4xl font-black text-gray-900 tracking-tighter uppercase">Authentification</h3>
                </div>
                <input type="password" id="adminPass" placeholder="••••" class="w-full p-7 bg-gray-50 border-2 border-transparent focus:border-blue-600 rounded-3xl mb-8 text-center outline-none transition-all text-3xl font-black tracking-widest">
                <button onclick="handleLogin()" class="w-full bg-pharma text-white py-6 rounded-3xl font-black text-xl shadow-2xl hover:shadow-blue-200 transition-all active:scale-95 uppercase">Valider l'accès</button>
            </div>

            <div id="adminPanel" class="hidden space-y-8 animate-fade-in">
                <div class="border-b pb-6">
                    <h3 class="text-3xl font-black text-blue-900 tracking-tighter uppercase text-center">Gestionnaire</h3>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="text" id="pNameFr" placeholder="Nom du produit" class="w-full p-5 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-600 font-bold">
                    <input type="text" id="pBrand" placeholder="Marque" class="w-full p-5 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-600 font-bold">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input type="number" id="pPrice" placeholder="Prix (DA)" class="w-full p-5 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-600 font-black">
                    <select id="pCat" class="w-full p-5 bg-gray-50 rounded-2xl outline-none border-2 border-transparent focus:border-blue-600 font-bold">
                        <option>Dermocosmétique</option>
                        <option>Maman & Bébé</option>
                        <option>Hygiène</option>
                        <option>Compléments</option>
                    </select>
                </div>
                <div class="border-4 border-dashed border-gray-100 p-12 rounded-[40px] text-center bg-gray-50/50">
                    <input type="file" id="pImgFile" accept="image/*" class="hidden" onchange="updateFileName()">
                    <label for="pImgFile" class="cursor-pointer block">
                        <i class="fa-solid fa-cloud-arrow-up text-6xl text-blue-100 mb-6 block"></i>
                        <span class="text-blue-600 font-black block text-sm uppercase" id="fileName">Téléverser l'image du produit</span>
                    </label>
                </div>
                <button onclick="addProduct()" id="saveBtn" class="w-full bg-green-600 text-white py-7 rounded-[30px] font-black text-xl shadow-2xl hover:bg-green-700 transition-all active:scale-95 uppercase tracking-widest">🚀 Mettre à jour le catalogue</button>
                <div class="text-center">
                    <button onclick="logoutAdmin()" class="text-red-400 text-[10px] font-black uppercase tracking-[0.3em] hover:text-red-600 transition-colors">Déconnexion de session</button>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/213770762987" class="whatsapp-float"><i class="fa-brands fa-whatsapp"></i></a>

    <script>
        // --- 1. إعدادات Supabase (تأكد من وضع روابطك هنا) ---
        const SB_URL = "https://xxxxxx.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
        
        // إنشاء اتصال سيباباز مع معالجة الخطأ لضمان عدم توقف المتصفح
        let supabase;
        try {
            supabase = window.supabase.createClient(SB_URL, SB_KEY);
        } catch(e) { console.error("Client Error", e); }

        let allProducts = [];
        let isAdmin = localStorage.getItem('samy_admin_session') === 'true';

        // --- 2. وظائف الواجهة (قفل، إغلاق، تسجيل) ---
        function showAdmin() {
            document.getElementById('adminModal').classList.remove('hidden');
        }

        function closeAdmin() {
            document.getElementById('adminModal').classList.add('hidden');
        }

        function handleLogin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "pharmaciesami001") {
                isAdmin = true;
                localStorage.setItem('samy_admin_session', 'true');
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
                renderGrid(allProducts);
            } else {
                alert("Code incorrect !");
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('samy_admin_session');
            isAdmin = false;
            location.reload();
        }

        function updateFileName() {
            const file = document.getElementById('pImgFile').files[0];
            if(file) document.getElementById('fileName').innerText = file.name;
        }

        // --- 3. جلب وعرض البيانات من Supabase ---
        async function fetchProducts() {
            if(!supabase) return;
            const { data, error } = await supabase
                .from('products')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }
            allProducts = data;
            renderGrid(allProducts);
        }

        function renderGrid(products) {
            const grid = document.getElementById('productsGrid');
            if(products.length === 0) {
                grid.innerHTML = `<p class="col-span-full text-center py-20 text-gray-300 font-bold uppercase tracking-widest">Aucun produit disponible</p>`;
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card p-7 ${isAdmin ? 'is-admin' : ''}">
                    <div onclick="deleteProduct('${p.id}')" class="delete-btn" title="Supprimer"><i class="fa-solid fa-trash-can"></i></div>
                    <div class="aspect-[4/5] bg-gray-50 rounded-[25px] mb-8 overflow-hidden flex items-center justify-center p-6">
                        <img src="${p.img}" class="max-h-full max-w-full object-contain mix-blend-multiply transition-transform duration-700 hover:scale-110" loading="lazy">
                    </div>
                    <div class="flex-grow">
                        <span class="text-[10px] text-blue-600 font-black uppercase tracking-[0.25em] mb-3 block opacity-60">${p.brand || 'Premium Care'}</span>
                        <h4 class="font-bold text-gray-900 text-xl leading-tight h-14 overflow-hidden mb-8 line-clamp-2 uppercase tracking-tighter">${p.name_fr}</h4>
                    </div>
                    <div class="mt-auto flex justify-between items-center pt-8 border-t border-gray-50">
                        <div>
                            <span class="text-[10px] text-gray-400 block font-black uppercase mb-1">Prix Pharmacie</span>
                            <span class="text-3xl font-black pharma-blue tracking-tighter">${p.price} <small class="text-xs">DA</small></span>
                        </div>
                        <a href="https://wa.me/213770762987?text=Commande: ${p.name_fr}" target="_blank" 
                           class="bg-green-500 text-white w-16 h-16 rounded-2xl flex items-center justify-center hover:bg-green-600 transition-all shadow-xl shadow-green-100 transform active:scale-90">
                           <i class="fa-brands fa-whatsapp text-3xl"></i>
                        </a>
                    </div>
                </div>
            `).join('');
        }

        // --- 4. إضافة وحذف المنتجات ---
        async function addProduct() {
            const btn = document.getElementById('saveBtn');
            const file = document.getElementById('pImgFile').files[0];
            const name = document.getElementById('pNameFr').value;
            const price = document.getElementById('pPrice').value;

            if(!file || !name || !price) { alert("Veuillez remplir les champs obligatoires !"); return; }

            btn.disabled = true;
            btn.innerHTML = "TRAITEMENT EN COURS...";

            try {
                // رفع الصورة لـ Bucket اسمه 'product-images'
                const fileName = `${Date.now()}_${file.name}`;
                const { error: upErr } = await supabase.storage.from('product-images').upload(fileName, file);
                if(upErr) throw upErr;

                const { data: { publicUrl } } = supabase.storage.from('product-images').getPublicUrl(fileName);

                // إرسال البيانات للجدول
                const { error: inErr } = await supabase.from('products').insert([{
                    name_fr: name,
                    brand: document.getElementById('pBrand').value,
                    price: parseFloat(price),
                    category: document.getElementById('pCat').value,
                    img: publicUrl
                }]);

                if(inErr) throw inErr;
                alert("Produit ajouté avec succès !");
                location.reload();
            } catch(e) {
                alert("Erreur: " + e.message);
                btn.disabled = false;
                btn.innerHTML = "RÉESSAYER";
            }
        }

        async function deleteProduct(id) {
            if(!confirm("Êtes-vous sûr ?")) return;
            const { error } = await supabase.from('products').delete().eq('id', id);
            if(!error) location.reload();
        }

        // --- 5. الفرز والبحث ---
        function filterByCategory(cat) {
            // تحديث الأزرار بصرياً
            document.querySelectorAll('.cat-chip').forEach(chip => {
                chip.classList.remove('active');
                if(chip.innerText === cat) chip.classList.add('active');
            });
            
            document.getElementById('section-title').innerText = cat === 'Tout' ? 'Catalogue' : cat;
            const filtered = cat === 'Tout' ? allProducts : allProducts.filter(p => p.category === cat);
            renderGrid(filtered);
        }

        function searchProducts() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allProducts.filter(p => 
                p.name_fr.toLowerCase().includes(val) || 
                (p.brand && p.brand.toLowerCase().includes(val))
            );
            renderGrid(filtered);
        }

        // --- 6. التشغيل عند التحميل ---
        window.onload = () => {
            if(isAdmin) {
                document.getElementById('loginArea').classList.add('hidden');
                document.getElementById('adminPanel').classList.remove('hidden');
            }
            fetchProducts();
        };
    </script>
</body>
</html>
